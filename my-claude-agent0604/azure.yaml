# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.40-preview'
name: ai-foundry-starter-basic
services:
    my-claude-agent0604:
        project: src/my-claude-agent0604
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            startupCommand: python main.py
    my-claude-agent0604-foundryhost:
        project: src/my-claude-agent0604-foundryhost
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            startupCommand: python main.py
    my-claude-agent0604-trace:
        project: src/my-claude-agent0604-trace
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            startupCommand: python main.py
infra:
    provider: bicep
    path: ./infra
