name: my-claude-agent
description: My hosted Claude agent running on Foundry
template:
  kind: hosted
  protocols:
      - protocol: responses
        version: 1.0.0
  environment_variables:
      - name: CLAUDE_CODE_USE_FOUNDRY
        value: "1"
      - name: AZURE_AI_PROJECT_ENDPOINT
        value: ${AZURE_AI_PROJECT_ENDPOINT}
      - name: APPINSIGHTS_CONNECTION_STRING
        value: ${APPLICATIONINSIGHTS_CONNECTION_STRING}
      - name: ENABLE_INSTRUMENTATION
        value: "true"
      - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
        value: "true"
      - name: ANTHROPIC_FOUNDRY_BASE_URL
        value: https://foundry-hishida.services.ai.azure.com/anthropic
      - name: ANTHROPIC_FOUNDRY_API_KEY
        value: ${ANTHROPIC_FOUNDRY_API_KEY}
      - name: ANTHROPIC_DEFAULT_OPUS_MODEL
        value: claude-opus-4-6
      - name: ANTHROPIC_DEFAULT_SONNET_MODEL
        value: claude-sonnet-4-6
      - name: ANTHROPIC_DEFAULT_HAIKU_MODEL
        value: claude-haiku-4-5
      - name: CLAUDE_MODEL
        value: sonnet
      - name: CLAUDE_MAX_TURNS
        value: "12"
      - name: CLAUDE_EFFORT
        value: medium
      - name: CLAUDE_PERMISSION_MODE
        value: dontAsk
      - name: CLAUDE_CODE_USE_POWERSHELL_TOOL
        value: "1"
      - name: AGENT_WORKSPACE_ROOT
        value: work


